services:
    store-frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile
        container_name: frontend
        restart: unless-stopped
        ports:
            - "3001:3001" 
        environment:
            - NEXT_PUBLIC_API_URL=http://localhost:3000/api
        depends_on:
            - store-backend
        networks:
            - store-network
    
    store-backend:
        build:
            context: ./backend
            dockerfile: Dockerfile
        container_name: backend
        restart: unless-stopped
        ports:
            - "3000:3000"
        environment:
            - DB_HOST=db
            - DB_PORT=5432
            - DB_USERNAME=postgres
            - DB_PASSWORD=postgres
            - DB_NAME=store
            - JWT_SECRET=my-super-jwt-key-17124
            - JWT_EXPIRES_IN=24h
            - JWT_REFRESH_EXPIRES_IN=7d
            - PORT=3000
            - NODE_ENV=development
        volumes:
            - ./backend/src:/app/src
            - ./backend/uploads:/app/uploads
        depends_on:
            db:
                condition: service_healthy
        networks:
            - store-network
    db:
        image: postgres:15-alpine
        container_name: store-db
        restart: unless-stopped
        ports:
            - "5432:5432"
        environment:
            - POSTGRES_USER=postgres
            - POSTGRES_PASSWORD=postgres
            - POSTGRES_DB=store
        volumes:
            - postgres-data:/var/lib/postgresql/data
            - ./backend/docker-init-scripts:/docker-entrypoint-initdb.d
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - store-network
    pgadmin:
        image: dpage/pgadmin4:latest
        container_name: store-pgadmin
        restart: unless-stopped
        ports:
            - "8080:80"
        environment:
            - PGADMIN_DEFAULT_EMAIL=admin@storez.com
            - PGADMIN_DEFAULT_PASSWORD=admin
        volumes:
            - pgadmin-data:/var/lib/pgadmin
        depends_on:
            - db
        networks:
            - store-network

volumes:
    postgres-data:
    pgadmin-data:

networks:
    store-network:
        driver: bridge